name: Weekly Model Evaluation

on:
  workflow_dispatch:

  schedule:
    # 18:30 Vietnam time = 11:30 UTC
    # Every Monday
    - cron: "30 11 * * 1"

permissions:
  contents: write

env:
  TZ: "Asia/Ho_Chi_Minh"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Update latest stock data
        run: |
          uv run python -m data_pipeline.daily_crawl

      - name: Evaluate current production model
        run: |
          uv run python -m training.evaluate \
            --data data/raw/fpt_stock_price.csv \
            --artifact-dir artifacts/raw_fpt_only_residual_cnnlstm_transformer \
            --max-rows 300 \
            --output-name weekly_evaluation.csv

      - name: Generate Dashboard and Charts
        run: |
          uv run python -m training.report \
            --artifact-dir artifacts/raw_fpt_only_residual_cnnlstm_transformer

      - name: Show evaluation outputs
        run: |
          echo "Evaluation files:"
          ls -lah artifacts/raw_fpt_only_residual_cnnlstm_transformer/output || true

      - name: Publish Dashboard to GitHub Step Summary
        run: |
          # Render file report.md từ thư mục output
          cat artifacts/raw_fpt_only_residual_cnnlstm_transformer/output/report.md >> $GITHUB_STEP_SUMMARY

      - name: Commit evaluation results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Chỉ add thư mục output để giữ repo sạch sẽ
          git add artifacts/raw_fpt_only_residual_cnnlstm_transformer/output/*

          git commit -m "chore: save weekly evaluation reports to output folder" || echo "No changes to commit"
          git push

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-evaluation-results
          # Đóng gói zip nguyên thư mục output cho tiện download
          path: artifacts/raw_fpt_only_residual_cnnlstm_transformer/output/